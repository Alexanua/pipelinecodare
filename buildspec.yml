version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto20
    commands:
      - echo "Installing Maven"
      - yum update -y
      - yum install -y maven

  pre_build:
    commands:
      - echo "Running unit tests"
      - mvn test

  build:
    commands:
      - echo "Building the project"
      - mvn clean package -DskipTests

artifacts:
  files:
    - target/pipelinecodare.jar

cache:
  paths:
    - /root/.m2/**

